<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTS: Army Puzzle Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-purple: #9d50bb;
            --neon-pink: #ff00ff;
            --bg-dark: #0f0c29;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        /* --- FONDO "GAME NIGHT" FIEL AL ORIGINAL --- */
        .game-background {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #24145e 0%, #0f0c29 100%);
            z-index: -1;
        }

        .perspective-grid {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 50%;
            background-image: 
                linear-gradient(to right, rgba(0, 242, 254, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 254, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-scroll 10s linear infinite;
        }

        @keyframes grid-scroll {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* --- TÍTULO ESTILO ORIGINAL --- */
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* --- BOTONES ORIGINALES --- */
        .btn-menu {
            background: rgba(15, 12, 41, 0.8);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-menu:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .btn-purple {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(157, 80, 187, 0.2);
        }

        .btn-purple:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 30px var(--neon-purple);
        }

        .btn-pink {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .btn-pink:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* --- PANTALLAS --- */
        .screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        .screen.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- PUZZLE --- */
        .puzzle-frame {
            border: 4px solid var(--neon-purple);
            box-shadow: 0 0 40px rgba(157, 80, 187, 0.4);
            border-radius: 4px;
            background: #000;
            width: 90vw; height: 90vw;
            max-width: 420px; max-height: 420px;
        }

        #puzzle-grid {
            display: grid; gap: 1px; width: 100%; height: 100%;
        }

        .piece { cursor: pointer; transition: filter 0.2s; }
        .piece.active { outline: 3px solid white; z-index: 100; filter: brightness(1.3); }

        /* --- TARJETA DE CRISTAL (MANTENIMIENTO) --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 2px;
            text-align: center;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="game-background">
        <div class="perspective-grid"></div>
    </div>
    <div id="stars" class="fixed inset-0 pointer-events-none"></div>

    <!-- MENÚ PRINCIPAL -->
    <div id="menu-screen" class="screen active">
        <div class="text-center mb-12">
            <h1 class="main-title text-5xl mb-2">BTS: ARMY</h1>
            <p class="text-[10px] tracking-[0.6em] text-cyan-400 font-bold uppercase opacity-80">Puzzle Challenge</p>
        </div>

        <div class="flex flex-col gap-5 w-full max-w-[280px]">
            <button onclick="initGame(16)" class="btn-menu">Fácil (16)</button>
            <button onclick="initGame(36)" class="btn-menu btn-purple">Medio (36)</button>
            <button onclick="initGame(64)" class="btn-menu btn-pink">Experto (64)</button>
            
            <button onclick="goToMaintenance()" class="mt-6 text-[9px] font-bold text-gray-500 hover:text-white transition-colors tracking-[0.4em] uppercase">
                Continuar Partida
            </button>
        </div>

        <footer class="absolute bottom-10">
            <p class="text-[9px] font-bold text-purple-500/60 tracking-[0.5em] uppercase">I Purple You · BTS x ARMY</p>
        </footer>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="game-screen" class="screen">
        <div class="flex flex-col items-center gap-6">
            <div class="flex justify-between items-center w-full max-w-[420px] px-2">
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase font-bold text-cyan-400">Completado</span>
                    <span class="text-xl font-bold font-mono"><span id="done-count">0</span>/<span id="total-count">0</span></span>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleHint()" class="p-2 border border-white/20 hover:bg-white/10">👁️</button>
                    <button onclick="location.reload()" class="p-2 border border-red-500/50 text-red-400 hover:bg-red-500/20">✕</button>
                </div>
            </div>

            <div class="puzzle-frame">
                <div id="puzzle-grid"></div>
            </div>

            <div id="win-overlay" class="hidden text-center">
                <p class="text-2xl font-bold text-white mb-4">¡LO LOGRASTE, ARMY! 💜</p>
                <button onclick="location.reload()" class="btn-menu">Menú Principal</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA MANTENIMIENTO -->
    <div id="maintenance-screen" class="screen">
        <div class="glass-card">
            <div class="text-4xl mb-6">⚙️</div>
            <h2 class="font-bold text-xl mb-4 tracking-widest text-cyan-400">MANTENIMIENTO</h2>
            <p class="text-xs text-gray-400 leading-relaxed max-w-[200px] mx-auto mb-10">
                Estamos sincronizando la base de datos para habilitar el guardado automático.
            </p>
            <button onclick="location.reload()" class="btn-menu !text-[10px] !py-2">Volver</button>
        </div>
    </div>

    <!-- MODAL DE PISTA -->
    <div id="hint-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-6" onclick="toggleHint()">
        <img src="https://images.unsplash.com/photo-1612833603922-3bb16964c74a?q=80&w=1000" class="max-w-full max-h-full border border-white/20 shadow-2xl">
    </div>

    <script>
        const IMG = 'https://images.unsplash.com/photo-1612833603922-3bb16964c74a?q=80&w=1000';
        let totalPieces, rows, cols, piecesArray = [], selectedIdx = null;

        function createStars() {
            const container = document.getElementById('stars');
            for(let i=0; i<50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2;
                s.style.width = size + 'px'; s.style.height = size + 'px';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                container.appendChild(s);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goToMaintenance() { showScreen('maintenance-screen'); }
        function toggleHint() { document.getElementById('hint-modal').classList.toggle('hidden'); }

        function initGame(n) {
            totalPieces = n;
            rows = Math.sqrt(n); cols = rows;
            document.getElementById('total-count').innerText = n;
            piecesArray = [...Array(n).keys()];
            
            // Barajar
            for (let i = piecesArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [piecesArray[i], piecesArray[j]] = [piecesArray[j], piecesArray[i]];
            }
            
            showScreen('game-screen');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('puzzle-grid');
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.innerHTML = '';
            
            let correct = 0;
            piecesArray.forEach((pos, idx) => {
                if(pos === idx) correct++;
                const p = document.createElement('div');
                p.className = 'piece';
                p.style.backgroundImage = `url('${IMG}')`;
                const r = Math.floor(pos / cols);
                const c = pos % cols;
                p.style.backgroundSize = `${cols * 100}% ${rows * 100}%`;
                p.style.backgroundPosition = `${(c * 100) / (cols - 1)}% ${(r * 100) / (rows - 1)}%`;
                
                p.onclick = () => {
                    if(selectedIdx === null) {
                        selectedIdx = idx;
                        p.classList.add('active');
                    } else {
                        [piecesArray[selectedIdx], piecesArray[idx]] = [piecesArray[idx], piecesArray[selectedIdx]];
                        selectedIdx = null;
                        renderGrid();
                        checkVictory();
                    }
                };
                grid.appendChild(p);
            });
            document.getElementById('done-count').innerText = correct;
        }

        function checkVictory() {
            if(piecesArray.every((v, i) => v === i)) {
                document.getElementById('win-overlay').classList.remove('hidden');
                document.getElementById('puzzle-grid').style.pointerEvents = 'none';
            }
        }

        window.onload = createStars;
    </script>
</body>
</html>
