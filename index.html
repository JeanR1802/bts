<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubie Jam - Menú</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black">

    <!-- PANTALLA DE MANTENIMIENTO -->
    <div id="pantalla-mantenimiento" class="hidden items-center justify-center min-h-screen bg-black text-white font-sans">
        <div class="w-full h-[100dvh] relative bg-gradient-to-b from-neutral-900 to-black flex flex-col items-center justify-center p-6 text-center">
            <i data-lucide="wrench" class="w-24 h-24 text-white mb-6 animate-bounce" stroke-width="1.5"></i>
            <h1 class="text-3xl font-black mb-2 text-white drop-shadow-md">
                EN MANTENIMIENTO
            </h1>
            <p class="text-gray-400 mb-8 text-lg">
                Estamos preparando nuevas batallas y mejorando los servidores. ¡Vuelve pronto!
            </p>
            <button 
                onclick="cambiarPantalla('menu')"
                class="flex items-center justify-center gap-2 bg-white hover:bg-gray-200 border-b-4 border-gray-400 active:border-b-0 active:translate-y-1 text-black font-bold py-3 px-8 rounded-full transition-all w-full max-w-[200px]"
            >
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                VOLVER
            </button>
        </div>
    </div>

    <!-- PANTALLA PRINCIPAL (MENÚ) -->
    <div id="pantalla-menu" class="flex items-center justify-center min-h-screen bg-black font-sans select-none">
        <!-- Contenedor responsivo a pantalla completa -->
        <div class="w-full h-[100dvh] overflow-hidden relative bg-gradient-to-b from-neutral-800 via-neutral-900 to-black">
            
            <!-- Fondo decorativo (Estrellas y siluetas) -->
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                <div class="absolute top-10 left-10 w-2 h-2 bg-white rounded-full opacity-20"></div>
                <div class="absolute top-32 right-12 w-3 h-3 bg-white rounded-full opacity-10"></div>
                <div class="absolute top-1/2 left-8 w-1.5 h-1.5 bg-white rounded-full opacity-30"></div>
                <div class="absolute top-20 right-1/3 w-2 h-2 bg-gray-300 rounded-full opacity-20"></div>
                
                <!-- Silueta de montañas/bosque al fondo -->
                <svg class="absolute bottom-0 w-full h-48 md:h-64 text-black opacity-100 drop-shadow-2xl" viewBox="0 0 1440 320" fill="currentColor" preserveAspectRatio="none">
                    <path d="M0,288L48,272C96,256,192,224,288,197.3C384,171,480,149,576,165.3C672,181,768,235,864,250.7C960,267,1056,245,1152,250.7C1248,256,1344,288,1392,304L1440,320L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
                </svg>
            </div>

            <!-- Contenido Principal -->
            <div class="relative z-10 flex flex-col items-center justify-center h-full p-6 max-w-md mx-auto w-full">
                
                <!-- Encabezado / Título -->
                <div class="text-center mb-8 w-full">
                    <h1 class="text-4xl sm:text-5xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] tracking-wide">
                        ROMPE<span class="text-gray-400">CABEZAS</span>
                    </h1>
                    <p class="text-gray-500 text-sm font-semibold tracking-widest mt-2 uppercase">
                        Desafío Individual
                    </p>
                </div>

                <!-- Sección de Avatar y Estadísticas -->
                <div class="flex items-center justify-center relative w-full mb-12">
                    
                    <!-- Estadísticas Izquierda -->
                    <div class="absolute left-0 flex flex-col gap-2 bg-white/5 p-2 rounded-r-xl border-y border-r border-white/10 backdrop-blur-sm">
                        <div class="flex items-center gap-1.5">
                            <i data-lucide="crown" class="w-3.5 h-3.5 text-white"></i>
                            <span class="text-xs font-bold text-white">341</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <i data-lucide="coins" class="w-3.5 h-3.5 text-white"></i>
                            <span class="text-xs font-bold text-white">80</span>
                        </div>
                    </div>

                    <!-- Avatar Central -->
                    <div class="flex flex-col items-center">
                        <div class="w-32 h-32 rounded-2xl border-[4px] border-neutral-700 bg-black flex items-center justify-center shadow-[0_0_25px_rgba(255,255,255,0.15)] relative overflow-hidden">
                            <!-- Borde interior oscuro -->
                            <div class="absolute inset-1 rounded-2xl border border-white/10"></div>
                            
                            <!-- Logo BTS en SVG ajustado -->
                            <svg class="w-16 h-16 text-white drop-shadow-md" viewBox="0 0 100 100" fill="currentColor">
                                <path d="M 24,10 L 46,24 L 46,76 L 24,90 Z" />
                                <path d="M 76,10 L 54,24 L 54,76 L 76,90 Z" />
                            </svg>
                        </div>
                        <div class="mt-4 bg-white shadow-[0_0_15px_rgba(255,255,255,0.3)] px-6 py-1.5 rounded-full border border-gray-200">
                            <p class="text-sm font-black text-black tracking-widest">ARMY</p>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción (Centro) -->
                <div class="flex flex-col items-center gap-5 w-full max-w-[240px] mx-auto mt-4">
                    
                    <!-- Botón Comenzar -->
                    <button 
                        onclick="cambiarPantalla('mantenimiento')"
                        class="group relative w-full flex items-center justify-center gap-3 bg-white active:bg-gray-200 border-b-[6px] border-gray-400 active:border-b-0 active:translate-y-[6px] text-black font-black text-xl py-4 px-6 rounded-full transition-all shadow-[0_4px_15px_rgba(255,255,255,0.2)]"
                    >
                        <i data-lucide="play" class="w-6 h-6 text-black fill-black drop-shadow-sm"></i>
                        <span class="drop-shadow-sm tracking-wide">COMENZAR</span>
                    </button>

                    <!-- Botón Opciones -->
                    <button class="group w-full flex items-center justify-center gap-3 bg-neutral-800 active:bg-neutral-900 border-b-[5px] border-black active:border-b-0 active:translate-y-[5px] text-white font-bold text-lg py-3 px-6 rounded-full transition-all shadow-lg border border-neutral-700">
                        <i data-lucide="settings" class="w-5 h-5 drop-shadow-sm text-gray-300"></i>
                        <span class="drop-shadow-sm tracking-wide text-gray-100">OPCIONES</span>
                    </button>

                    <!-- Botón Tienda -->
                    <button class="group w-full flex items-center justify-center gap-3 bg-neutral-800 active:bg-neutral-900 border-b-[5px] border-black active:border-b-0 active:translate-y-[5px] text-white font-bold text-lg py-3 px-6 rounded-full transition-all shadow-lg border border-neutral-700">
                        <i data-lucide="shopping-cart" class="w-5 h-5 drop-shadow-sm text-gray-300"></i>
                        <span class="drop-shadow-sm tracking-wide text-gray-100">TIENDA</span>
                    </button>

                </div>
            </div>
        </div>
    </div>

    <!-- Script de lógica de navegación e íconos -->
    <script>
        // Inicializar los íconos de Lucide
        lucide.createIcons();

        // Lógica para cambiar entre pantallas
        function cambiarPantalla(pantalla) {
            const menu = document.getElementById('pantalla-menu');
            const mantenimiento = document.getElementById('pantalla-mantenimiento');

            if (pantalla === 'mantenimiento') {
                // Ocultar menú
                menu.classList.add('hidden');
                menu.classList.remove('flex');
                // Mostrar mantenimiento
                mantenimiento.classList.remove('hidden');
                mantenimiento.classList.add('flex');
            } else {
                // Ocultar mantenimiento
                mantenimiento.classList.add('hidden');
                mantenimiento.classList.remove('flex');
                // Mostrar menú
                menu.classList.remove('hidden');
                menu.classList.add('flex');
            }
        }
    </script>
</body>
</html>
